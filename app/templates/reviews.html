{% extends 'base.html' %}

{% block content %}

<h2 class="page-title">Customer Reviews</h2>

{% for r in reviews %}

<div class="review-card">

    <h5>{{ r[0] }}</h5>

    <div class="rating">

        {% for i in range(r[1]) %}
            ⭐
        {% endfor %}

    </div>

    <p class="mt-3">
        {{ r[2] }}
    </p>

</div>

{% endfor %}

{% endblock %}
