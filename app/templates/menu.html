{% extends 'base.html' %}

{% block content %}

<h2 class="page-title">Menu Items</h2>

<div class="row">

{% for item in menu_items %}

<div class="col-md-4 mb-4">

    <div class="card p-4">

        <h5>{{ item[1] }}</h5>

        <p>
            Restaurant:
            <strong>{{ item[0] }}</strong>
        </p>

        <h4 class="price">
            Rs {{ "{:,.0f}".format(item[2]) }}
        </h4>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
